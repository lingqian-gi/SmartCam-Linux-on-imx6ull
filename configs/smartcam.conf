# SmartCam Linux — 主配置文件
# 路径: /etc/smartcam/smartcam.conf

[camera]
# V4L2 设备节点
device = /dev/video0
# 默认分辨率 (宽x高)
width  = 640
height = 480
# 像素格式: yuyv | mjpeg
format = mjpeg
# 帧率
fps = 30

[display]
# Qt 渲染后端: linuxfb (framebuffer) | xcb (X11)
platform = linuxfb
# framebuffer 设备
fb = /dev/fb0
# 触摸输入设备
touch = /dev/input/event1
# 屏幕尺寸 (用于布局适配)
screen_width  = 800
screen_height = 480

[network]
# MJPEG-over-HTTP 端口
http_port = 8080
# RTSP 流媒体端口
rtsp_port = 8554
# TCP 控制协议端口
control_port = 9000
# 最大并发客户端
max_clients = 10

[storage]
# 存储基础路径（程序自动追加 /photos 和 /videos 子目录）
#   /data  → tmpfs，速度快但重启后丢失
#   /home/debian/smartcam → eMMC 持久化，重启后不丢失
# 亦可在 Settings 面板中通过下拉框切换（设置会持久化到本文件）
photo_dir = /data/photos
# 录像保存路径
video_dir = /data/videos
# 自动清理阈值 (MB)
keep_mb = 100

[logging]
# 日志级别: debug | info | warn | error
level = info
# syslog 集成
use_syslog = true
